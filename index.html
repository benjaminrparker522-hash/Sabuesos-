<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sabuesos GYM</title>
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#09090b">
    
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/5253/5253928.png">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/5253/5253928.png">
    <link rel="manifest" href="manifest.json">
    

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: #09090b; color: #f4f4f5; font-family: system-ui, -apple-system, sans-serif; padding-bottom: 60px; }
        header { background-color: #09090b; border-bottom: 2px solid #dc2626; padding: 15px; text-align: center; }
        .title { font-size: 24px; font-weight: 800; letter-spacing: 1px; color: #ffffff; }
        .title span { color: #dc2626; }
        .subtitle { font-size: 10px; color: #a1a1aa; letter-spacing: 2px; margin-top: 2px; }
        .container { max-width: 450px; margin: 0 auto; padding: 15px; }
        .card-frase { background: linear-gradient(to right, #18181b, #2d0606, #18181b); border: 1px solid #27272a; padding: 15px; border-radius: 12px; margin-bottom: 15px; text-align: center; }
        .card-frase p { font-size: 11px; color: #ef4444; font-weight: bold; letter-spacing: 1px; }
        .card-frase h2 { font-size: 14px; font-weight: bold; margin-top: 5px; color: #f4f4f5; }
        
        /* PANEL DE TIEMPO */
        .panel-tiempo { background-color: #18181b; border: 1px solid #27272a; border-radius: 12px; padding: 12px; margin-bottom: 15px; display: flex; justify-content: space-between; gap: 10px; }
        .col-tiempo { flex: 1; background-color: #09090b; padding: 10px; border-radius: 8px; border: 1px solid #27272a; text-align: center; }
        .label-t { font-size: 10px; color: #a1a1aa; font-weight: bold; display: block; margin-bottom: 2px; }
        .num-t { font-size: 20px; font-weight: 900; color: #ffffff; }
        .num-descanso { color: #f59e0b; }
        .btn-t { width: 100%; background-color: #27272a; color: white; border: none; padding: 6px; border-radius: 6px; font-size: 10px; font-weight: bold; margin-top: 5px; cursor: pointer; }
        .btn-timer { background-color: #d97706; }
        .blink { animation: parpadeo 1s infinite; }
        @keyframes parpadeo { 0%, 100% { background-color: #09090b; } 50% { background-color: #7f1d1d; } }

        /* CALENDARIO */
        .grid-dias { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; background-color: #18181b; padding: 5px; border-radius: 12px; margin-bottom: 15px; }
        .btn-dia { background: none; border: none; color: #a1a1aa; padding: 8px 2px; font-size: 11px; font-weight: bold; border-radius: 8px; display: flex; flex-direction: column; align-items: center; gap: 2px; cursor: pointer; }
        .btn-dia.activo { background-color: #dc2626; color: white; }

        /* EJERCICIOS */
        .card-ejercicio { background-color: #18181b; border: 1px solid #27272a; border-radius: 12px; padding: 15px; margin-bottom: 12px; }
        .header-ej { display: flex; justify-content: space-between; align-items: flex-start; }
        .badge { background-color: #3f0712; color: #f87171; font-size: 9px; font-weight: bold; padding: 2px 6px; border-radius: 4px; border: 1px solid #991b1b; text-transform: uppercase; }
        .nom-ej { font-size: 14px; font-weight: bold; color: white; margin-top: 5px; }
        .target-ej { font-size: 11px; color: #a1a1aa; margin-top: 2px; font-weight: 500; }
        .btn-reg { background-color: #dc2626; color: white; border: none; font-size: 11px; font-weight: bold; padding: 6px 12px; border-radius: 8px; cursor: pointer; }
        .tip-ej { background-color: #09090b; padding: 8px; border-radius: 8px; font-size: 10px; color: #a1a1aa; margin-top: 8px; border-left: 3px solid #dc2626; }
        .row-set { display: flex; align-items: center; gap: 8px; margin-top: 8px; }
        .num-set { font-size: 11px; color: #71717a; font-weight: bold; width: 20px; }
        .input-box { flex: 1; background-color: #09090b; border: 1px solid #27272a; color: white; padding: 6px; border-radius: 8px; text-align: center; font-size: 12px; font-weight: bold; }
        
        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background-color: #dc2626; color: white; padding: 10px 20px; border-radius: 8px; font-size: 11px; font-weight: bold; display: none; z-index: 100; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

    <header>
        <h1 class="title">SABUESOS <span>GYM</span></h1>
        <div class="subtitle">KIM GUN-WOO STYLE • 57 KG • 18 AÑOS</div>
    </header>

    <div class="container">
        <div class="card-frase">
            <p>La Ley del Sabueso</p>
            <h2>"El dolor es temporal, el escudo es para siempre."</h2>
        </div>

        <div class="panel-tiempo">
            <div class="col-tiempo">
                <span class="label-t">⏱️ TIEMPO TOTAL</span>
                <div id="chrono-display" class="num-t">00:00:00</div>
                <button onclick="toggleChrono()" id="btn-chrono-play" class="btn-t">▶ EMPEZAR</button>
            </div>
            <div id="timer-box" class="col-tiempo">
                <span class="label-t">⏳ DESCANSO</span>
                <div id="timer-display" class="num-t num-descanso">03:00</div>
                <button onclick="startRestTimer()" id="btn-timer-start" class="btn-t btn-timer">INICIAR 3 MIN</button>
            </div>
        </div>

        <div class="grid-dias">
            <button onclick="selectDay('lunes')" id="btn-lunes" class="btn-dia"><span>LUN</span><span style="font-size:8px; display:block; margin-top:2px;">EMP</span></button>
            <button onclick="selectDay('martes')" id="btn-martes" class="btn-dia"><span>MAR</span><span style="font-size:8px; display:block; margin-top:2px;">TIR</span></button>
            <button onclick="selectDay('miercoles')" id="btn-miercoles" class="btn-dia"><span>MIÉ</span><span style="font-size:8px;color:#ef4444; display:block; margin-top:2px;">P+A</span></button>
            <button onclick="selectDay('jueves')" id="btn-jueves" class="btn-dia"><span>JUE</span><span style="font-size:8px; display:block; margin-top:2px;">EMP</span></button>
            <button onclick="selectDay('viernes')" id="btn-viernes" class="btn-dia"><span>VIE</span><span style="font-size:8px;color:#ef4444; display:block; margin-top:2px;">T+A</span></button>
            <button onclick="selectDay('sabado')" id="btn-sabado" class="btn-dia"><span>SÁB</span><span style="font-size:8px;color:#ef4444; display:block; margin-top:2px;">BOX</span></button>
            <button onclick="selectDay('domingo')" id="btn-domingo" class="btn-dia"><span>DOM</span><span style="font-size:8px; display:block; margin-top:2px;">OFF</span></button>
        </div>

        <h3 id="routine-title" style="font-size:14px; margin-bottom:12px; font-weight:800; text-transform:uppercase;"></h3>
        <div id="exercises-container"></div>
    </div>

    <div id="toast" class="toast">¡MARCA GUARDADA EN EL ESCUDO!</div>

    <script>
        const workoutData = {
            lunes: { title: "🥊 Empuje (Pecho/Hombro/Tríceps) • 2500 Kcal", exercises: [
                { id: "l_press_inc", name: "1. Press Inclinado con Mancuernas", target: "3 series × 8-9 reps", type: "Fuerza Pesada", tip: "Falla en la repetición 8 o 9 con técnica impecable.", sets: [ {wt: "", reps: ""}, {wt: "", reps: ""}, {wt: "", reps: ""} ] },
                { id: "l_press_maq", name: "2. Press Plano en Máquina", target: "3 series × 8-9 reps", type: "Fuerza Pesada", tip: "Baja controlado y explota arriba como un golpe recto.", sets: [ {wt: "", reps: ""}, {wt: "", reps: ""}, {wt: "", reps: ""} ] },
                { id: "l_press_mil", name: "3. Press Militar con Mancuernas", target: "2 series × 8-9 reps", type: "Fuerza Pesada", tip: "Solo 2 series reales. No balancees la espalda.", sets: [ {wt: "", reps: ""}, {wt: "", reps: ""} ] },
                { id: "l_vuelos", name: "4. Vuelos Laterales con Mancuernas", target: "3 series × 12-15 reps", type: "Bombeo", tip: "Para ganar hombros en 3D que sostengan la guardia.", sets: [ {wt: "", reps: ""}, {wt: "", reps: ""}, {wt: "", reps: ""} ] },
                { id: "l_triceps", name: "5. Tríceps en Polea (Barra)", target: "2 series × 8-9 reps", type: "Aislamiento", tip: "Codos pegados a las costillas. Falla real.", sets: [ {wt: "", reps: ""}, {wt: "", reps: ""} ] }
            ]},
            martes: { title: "🥊 Tirón (Espalda/Bíceps) • 2500 Kcal", exercises: [
                { id: "m_jalon", name: "1. Jalón al Pecho en Polea", target: "3 series × 8-9 reps", type: "Fuerza Pesada", tip: "Guía el movimiento bajando con los codos.", sets: [ {wt: "", reps: ""}, {wt: "", reps: ""}, {wt: "", reps: ""} ] },
                { id: "m_remo_abd", name: "2. Remo en Polea al Abdomen", target: "3 series × 8-9 reps", type: "Fuerza Pesada", tip: "Saca pecho y aprieta la espalda 1 segundo al final.", sets: [ {wt: "", reps: ""}, {wt: "", reps: ""}, {wt: "", reps: ""} ] },
                { id: "m_remo_apoy", name: "3. Remo Apoyado en Máquina", target: "3 series × 8-9 reps", type: "Fuerza Pesada", tip: "Evita dar tirones, mantén el pecho firme.", sets: [ {wt: "", reps: ""}, {wt: "", reps: ""}, {wt: "", reps: ""} ] },
                { id: "m_curl_inc", name: "4. Curl Inclinado con Mancuernas", target: "2 series × 8-9 reps", type: "Aislamiento", tip: "Codos fijos atrás. Estira completo abajo.", sets: [ {wt: "", reps: ""}, {wt: "", reps: ""} ] },
                { id: "m_curl_pred", name: "5. Curl en Banco Predicador", target: "2 series × 8-9 reps", type: "Aislamiento", tip: "Rango completo. Falla en la repetición 8 o 9.", sets: [ {wt: "", reps: ""}, {wt: "", reps: ""} ] },
                { id: "m_curl_mart", name: "6. Curl Martillo", target: "2 series × 8-9 reps", type: "Fuerza Agarre", tip: "Fuerza de muñeca para sostener los impactos.", sets: [ {wt: "", reps: ""}, {wt: "", reps: ""} ] }
            ]},
            miercoles: { title: "🥊 Piernas de Acero + Abdomen • 2500 Kcal", exercises: [
                { id: "mi_prensa", name: "1. Prensa de Piernas", target: "3 series × 8-10 reps", type: "Fuerza Pesada", tip: "¡La base de tu pegada! Baja controlado.", sets: [ {wt: "", reps: ""}, {wt: "", reps: ""}, {wt: "", reps: ""} ] },
                { id: "mi_ext", name: "2. Extensión de Cuádriceps", target: "3 series × 10-12 reps", type: "Bombeo", tip: "Aprieta arriba un segundo.", sets: [ {wt: "", reps: ""}, {wt: "", reps: ""}, {wt: "", reps: ""} ] },
                { id: "mi_fem", name: "3. Curl Femoral", target: "3 series × 8-10 reps", type: "Fuerza", tip: "Controla la subida lenta del peso.", sets: [ {wt: "", reps: ""}, {wt: "", reps: ""}, {wt: "", reps: ""} ] },
                { id: "mi_abd_col", name: "4. Elevación de Piernas Colgado", target: "3 series × Al Fallo", type: "Abdomen", tip: "Sube las piernas usando la fuerza del core.", sets: [ {wt: "", reps: ""}, {wt: "", reps: ""}, {wt: "", reps: ""} ] }
            ]},
            jueves: { title: "🥊 Empuje (Repetición) • 2500 Kcal", exercises: [
                { id: "j_press_inc", name: "1. Press Inclinado con Mancuernas", target: "3 series × 8-9 reps", type: "Fuerza Pesada", tip: "Empuja con máxima explosividad.", sets: [ {wt: "", reps: ""}, {wt: "", reps: ""}, {wt: "", reps: ""} ] },
                { id: "j_press_maq", name: "2. Press Plano en Máquina", target: "3 series × 8-9 reps", type: "Fuerza Pesada", tip: "Falla de forma controlada y segura.", sets: [ {wt: "", reps: ""}, {wt: "", reps: ""}, {wt: "", reps: ""} ] }
            ]},
            viernes: { title: "🥊 Tirón + Abdomen • 2500 Kcal", exercises: [
                { id: "v_jalon", name: "1. Jalón al Pecho en Polea", target: "3 series × 8-9 reps", type: "Fuerza Pesada", tip: "Espalda en 'V' de boxeador.", sets: [ {wt: "", reps: ""}, {wt: "", reps: ""}, {wt: "", reps: ""} ] },
                { id: "v_curl_inc", name: "2. Curl Inclinado", target: "2 series × 8-9 reps", type: "Aislamiento", tip: "Solo 2 series al fallo real.", sets: [ {wt: "", reps: ""}, {wt: "", reps: ""} ] }
            ]},
            sabado: { title: "⚡ Sábado de Boxeo Cardio • 3000 Kcal", exercises: [
                { id: "s_cuerda", name: "Fase 1: Salto de Cuerda", target: "3 Rounds × 3 min", type: "Cardio Box", tip: "Gira la cuerda solo con las muñecas.", sets: [ {wt: "Minutos", reps: "3"} ] },
                { id: "s_saco", name: "Fase 2: Saco Pesado", target: "4 Rounds × 3 min", type: "Potencia", tip: "Ráfagas rápidas y golpes de poder.", sets: [ {wt: "Rounds", reps: "4"} ] }
            ]},
            domingo: { title: "🛌 Descanso Absoluto", exercises: [] }
        };

        let currentDay = 'lunes';
        let chronoInterval = null;
        let chronoSeconds = 0;
        let isChronoRunning = false;
        let timerInterval = null;
        let timerSeconds = 180;
        let isTimerActive = false;

        function toggleChrono() {
            const btn = document.getElementById('btn-chrono-play');
            if (isChronoRunning) {
                clearInterval(chronoInterval);
                btn.innerText = "▶ REANUDAR";
                isChronoRunning = false;
            } else {
                chronoInterval = setInterval(() => {
                    chronoSeconds++;
                    let hrs = Math.floor(chronoSeconds / 3600);
                    let mins = Math.floor((chronoSeconds % 3600) / 60);
                    let secs = chronoSeconds % 60;
                    document.getElementById('chrono-display').innerText = 
                        `${hrs.toString().padStart(2,'0')}:${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
                }, 1000);
                btn.innerText = "⏸ PAUSAR";
                isChronoRunning = true;
            }
        }

        function startRestTimer() {
            const display = document.getElementById('timer-display');
            const box = document.getElementById('timer-box');
            const btn = document.getElementById('btn-timer-start');

            if (isTimerActive) clearInterval(timerInterval);

            timerSeconds = 180;
            isTimerActive = true;
            box.classList.remove('blink');
            btn.innerText = "REINICIAR";

            timerInterval = setInterval(() => {
                timerSeconds--;
                let m = Math.floor(timerSeconds / 60);
                let s = timerSeconds % 60;
                display.innerText = `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;

                if (timerSeconds <= 0) {
                    clearInterval(timerInterval);
                    display.innerText = "¡A DARLE!";
                    box.classList.add('blink');
                    btn.innerText = "INICIAR 3 MIN";
                    isTimerActive = false;
                }
            }, 1000);
        }

        function selectDay(day) {
            currentDay = day;
            document.querySelectorAll('.btn-dia').forEach(btn => btn.classList.remove('activo'));
            document.getElementById(`btn-${day}`).classList.add('activo');

            const dayInfo = workoutData[day];
            document.getElementById('routine-title').innerText = dayInfo.title;
            renderExercises(dayInfo.exercises);
        }

        function renderExercises(exercises) {
            const container = document.getElementById('exercises-container');
            container.innerHTML = '';
            if (exercises.length === 0) {
                container.innerHTML = `<div style="text-align:center; padding:30px; color:#a1a1aa;">🛌 Hoy toca descansar el escudo.</div>`;
                return;
            }
            exercises.forEach((ex) => {
                let setsHtml = '';
                ex.sets.forEach((set, setIdx) => {
                    setsHtml += `
                        <div class="row-set">
                            <span class="num-set">S${setIdx + 1}</span>
                            <input type="text" value="${set.wt || ''}" placeholder="${ex.id.startsWith('s_') ? 'Fase' : 'Kilos'}" oninput="workoutData['${currentDay}'].exercises.find(e => e.id === '${ex.id}').sets[${setIdx}].wt = this.value" class="input-box">
                            <input type="number" value="${set.reps || ''}" placeholder="Reps" oninput="workoutData['${currentDay}'].exercises.find(e => e.id === '${ex.id}').sets[${setIdx}].reps = this.value" class="input-box">
                        </div>`;
                });
                container.innerHTML += `
                    <div class="card-ejercicio">
                        <div class="header-ej">
                            <div>
                                <span class="badge">${ex.type}</span>
                                <h4 class="nom-ej">${ex.name}</h4>
                                <p class="target-ej">${ex.target}</p>
                            </div>
                            <button onclick="saveLog()" class="btn-reg">Guardar</button>
                        </div>
                        <div class="tip-ej">🥊 ${ex.tip}</div>
                        <div>${setsHtml}</div>
                    </div>`;
            });
        }

        function saveLog() {
            localStorage.setItem('sabueso_offline_v1', JSON.stringify(workoutData));
            const toast = document.getElementById('toast');
            toast.style.display = "block";
            setTimeout(() => { toast.style.display = "none"; }, 2000);
        }

        window.onload = function() {
            const saved = localStorage.getItem('sabueso_offline_v1');
            if (saved) {
                const parsed = JSON.parse(saved);
                for(let d in parsed) { if(workoutData[d]) workoutData[d] = parsed[d]; }
            }
            selectDay('lunes');
        }
    </script>
</body>
  </html>
